services:
  db:
    image: postgres:16-alpine
    env_file: ./server/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      target: production
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      - db
    expose:
      - "3001"

  client:
    build:
      context: ./client
      target: production
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
